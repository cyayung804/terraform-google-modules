---
name: Scheduled file updates

on:
  workflow_dispatch:
  schedule:
    # 00:00 UTC is 8am SGT | 12:00 UTC is 8pm SGT
    - cron: '0 0,12 * * *'

env:
  TZ: "Asia/Singapore"

permissions:
  contents: write

jobs:
  run-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run bash script
        run: |
          make install
          make update

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit and push changes
        run: |
          git config --local user.email "cyayung804@gmail.com"
          git config --local user.name "cyayung804"
          git add -A
          git commit -S -m "Scheduled file updates: Run update.sh" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
